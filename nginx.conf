events {
    worker_connections 1024;
}

http {
    upstream mira_app {
        # Cookie-based sticky sessions — routes each client to the same instance
        # based on a session cookie rather than IP address. More reliable than
        # ip_hash for mobile clients that change IP mid-session (cellular, WiFi↔LTE).
        # The Redis adapter keeps WebSocket events in sync across instances, but
        # the socket.io HTTP upgrade handshake must land on the same instance.
        hash $cookie_MIRASRV consistent;
        server app1:3000;
        server app2:3000;
    }

    server {
        listen 80;

        location / {
            proxy_pass         http://mira_app;
            proxy_http_version 1.1;

            # Required for WebSocket upgrade
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Allow long-lived WebSocket connections
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}
